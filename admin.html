<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-Visa Portal – Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  :root {
    --navy: #0b1d3a;
    --gold: #c9a84c;
    --gold2: #e8c96d;
    --white: #ffffff;
    --text: #dde8f8;
    --muted: #8faed4;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(201,168,76,0.25);
    --radius: 16px;
    --error: #ff6b6b;
    --success: #34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; }

  nav {
    background: rgba(11,29,58,0.97);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    padding: 0 40px; height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--navy);
  }
  .nav-logo span { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--white); }
  .nav-badge {
    background: rgba(255,107,107,0.2); border: 1px solid rgba(255,107,107,0.4);
    color: #ff6b6b; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 50px; letter-spacing: 1px; text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .home-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 13px; text-decoration: none;
    transition: color 0.3s;
  }
  .home-btn:hover { color: var(--gold2); }
  .logout-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); font-size: 13px; padding: 8px 16px; border-radius: 8px;
    cursor: pointer; transition: all 0.3s; font-family: 'DM Sans', sans-serif;
  }
  .logout-btn:hover { background: rgba(255,107,107,0.15); color: #ff6b6b; }

  main { padding: 40px; max-width: 1200px; margin: 0 auto; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 700; color: var(--white); margin-bottom: 8px; }
  .page-title span { color: var(--gold2); }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 36px; }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: var(--radius); padding: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .stat-icon.gold  { background: rgba(201,168,76,0.15); color: var(--gold2); }
  .stat-icon.green { background: rgba(52,211,153,0.15); color: #34d399; }
  .stat-icon.blue  { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .stat-icon.red   { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--white); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 20px; border-radius: 50px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.3s; font-family: 'DM Sans', sans-serif;
  }
  .filter-btn.active, .filter-btn:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy); border-color: transparent; font-weight: 600;
  }

  .table-wrap { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: rgba(201,168,76,0.1); padding: 14px 20px; font-size: 11px; font-weight: 600; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; text-align: left; }
  td { padding: 16px 20px; font-size: 13px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.03); }

  .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 600; }
  .badge-submitted { background: rgba(251,146,60,0.15); color: #fb923c; }
  .badge-approved  { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-rejected  { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .badge-in_review { background: rgba(96,165,250,0.15); color: #60a5fa; }

  .status-select {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--white); font-size: 12px; padding: 6px 12px; border-radius: 8px;
    cursor: pointer; outline: none; font-family: 'DM Sans', sans-serif; transition: all 0.3s;
  }
  .status-select:hover { border-color: rgba(201,168,76,0.4); }
  .status-select option { background: var(--navy); }

  .update-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.3s; margin-left: 8px;
  }
  .update-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,168,76,0.4); }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  .login-overlay {
    position: fixed; inset: 0; background: var(--navy);
    display: flex; align-items: center; justify-content: center; z-index: 999;
    background-image: radial-gradient(ellipse at 30% 50%, rgba(26,75,140,0.4) 0%, transparent 60%);
  }
  .login-box { width: 100%; max-width: 420px; padding: 20px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--navy); margin-bottom: 12px;
  }
  .login-logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--white); }
  .login-logo p { font-size: 12px; color: #ff6b6b; letter-spacing: 2px; text-transform: uppercase; }
  .login-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.25); border-radius: 20px; padding: 40px; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
  .input-wrap input {
    width: 100%; padding: 12px 14px 12px 40px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: var(--white); font-size: 14px;
    font-family: 'DM Sans', sans-serif; transition: border-color 0.3s; outline: none;
  }
  .input-wrap input:focus { border-color: rgba(201,168,76,0.5); }
  .input-wrap input::placeholder { color: var(--muted); }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy); font-weight: 700; font-size: 15px;
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.3s;
  }
  .login-btn:hover { transform: translateY(-2px); }
  .login-msg {
    padding: 12px; border-radius: 8px; font-size: 13px;
    text-align: center; margin-bottom: 16px; display: none;
    background: rgba(255,107,107,0.15); color: var(--error);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.4);
    color: #34d399; padding: 12px 24px; border-radius: 10px;
    font-size: 13px; font-weight: 500; display: none; z-index: 9999;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="fas fa-shield-halved"></i></div>
      <h1>Admin Panel</h1>
      <p>Restricted Access Only</p>
    </div>
    <div class="login-card">
      <div class="login-msg" id="loginMsg"></div>
      <div class="input-group">
        <label>Admin Email</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="adminEmail" placeholder="admin@evisa.com"/>
        </div>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="adminPassword" placeholder="Enter admin password"/>
        </div>
      </div>
      <button class="login-btn" onclick="adminLogin()">
        <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
      </button>
    </div>
  </div>
</div>

<!-- NAVBAR -->
<nav>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/e visa.html" class="nav-logo">
      <div class="nav-logo-icon"><i class="fas fa-passport"></i></div>
      <span>E-Visa Portal</span>
    </a>
    <span class="nav-badge"><i class="fas fa-shield-halved"></i> Admin</span>
  </div>
  <div class="nav-right">
    <span style="font-size:13px;color:var(--muted)" id="adminName"></span>
    <a href="/e visa.html" class="home-btn">
      <i class="fas fa-home"></i> Home
    </a>
    <button class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="page-title">Admin <span>Dashboard</span></div>
  <div class="page-sub">Manage all visa applications and update their status.</div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon gold"><i class="fas fa-file-alt"></i></div>
      <div><div class="stat-num" id="totalApps">0</div><div class="stat-label">Total Applications</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
      <div><div class="stat-num" id="approvedApps">0</div><div class="stat-label">Approved</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-clock"></i></div>
      <div><div class="stat-num" id="reviewApps">0</div><div class="stat-label">In Review</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
      <div><div class="stat-num" id="rejectedApps">0</div><div class="stat-label">Rejected</div></div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterApps('all', this)">All</button>
    <button class="filter-btn" onclick="filterApps('submitted', this)">Submitted</button>
    <button class="filter-btn" onclick="filterApps('in_review', this)">In Review</button>
    <button class="filter-btn" onclick="filterApps('approved', this)">Approved</button>
    <button class="filter-btn" onclick="filterApps('rejected', this)">Rejected</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading applications...
    </div>
    <table id="appTable" style="display:none">
      <thead>
        <tr>
          <th>Reference No</th><th>Visa Type</th><th>Full Name</th>
          <th>Passport No</th><th>Nationality</th><th>Date</th>
          <th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="appTableBody"></tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://127.0.0.1:5000/api';
  let allApps = [];
  let adminToken = localStorage.getItem('adminToken');

  // ✅ Page load پر role check
  if (adminToken) {
    const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
    if (adminUser.role !== 'admin') {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      adminToken = null;
    } else {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminName').textContent = adminUser.full_name || 'Admin';
      loadApplications();
    }
  }

  async function adminLogin() {
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPassword').value;
    if (!email || !password) { showLoginMsg('Please enter email and password!'); return; }
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { showLoginMsg(data.message); return; }
      // ✅ صرف یہ ایک email admin ہے
const ADMIN_EMAIL = 'misbahatta916@gmail.com';

if (data.user.role !== 'admin' || data.user.email !== ADMIN_EMAIL) {
  showLoginMsg('Access denied! You are not authorized.');
  return;
}
// ✅ صرف یہ ایک email admin ہے
// const ADMIN_EMAIL = 'misbahatta916@gmail.com';

// if (data.user.role !== 'admin' || data.user.email !== ADMIN_EMAIL) {
//   showLoginMsg('Access denied! You are not authorized.');
//   return;
// }
       if (data.user.role !== 'admin') { showLoginMsg('Access denied! Admin account required.'); return; }
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', JSON.stringify(data.user));
      adminToken = data.token;
      document.getElementById('adminName').textContent = data.user.full_name;
      document.getElementById('loginOverlay').style.display = 'none';
      loadApplications();
    } catch (err) { showLoginMsg('Server error. Please try again.'); }
  }

  function showLoginMsg(msg) {
    const el = document.getElementById('loginMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  async function loadApplications() {
    try {
      const res = await fetch(`${API}/applications/all`, {
        headers: { 'Authorization': 'Bearer ' + adminToken }
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('loading').textContent = 'Error loading applications.'; return; }
      allApps = data.data;
      updateStats(allApps);
      renderTable(allApps);
    } catch (err) {
      document.getElementById('loading').textContent = 'Server error. Backend چل رہا ہے؟';
    }
  }

  function updateStats(apps) {
    document.getElementById('totalApps').textContent = apps.length;
    document.getElementById('approvedApps').textContent = apps.filter(a => a.status === 'approved').length;
    document.getElementById('reviewApps').textContent = apps.filter(a => a.status === 'in_review').length;
    document.getElementById('rejectedApps').textContent = apps.filter(a => a.status === 'rejected').length;
  }

  function renderTable(apps) {
    document.getElementById('loading').style.display = 'none';
    if (apps.length === 0) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('loading').textContent = 'کوئی application نہیں ملی۔';
      return;
    }
    document.getElementById('appTable').style.display = 'table';
    const tbody = document.getElementById('appTableBody');
    tbody.innerHTML = apps.map(app => `
      <tr id="row-${app.id}">
        <td><strong style="color:var(--gold2)">${app.reference_no}</strong></td>
        <td>${app.visa_type}</td>
        <td>${app.full_name}</td>
        <td>${app.passport_no}</td>
        <td>${app.nationality}</td>
        <td>${new Date(app.created_at).toLocaleDateString()}</td>
        <td><span class="badge badge-${app.status}" id="badge-${app.id}">${app.status.replace('_',' ')}</span></td>
        <td>
          <select class="status-select" id="select-${app.id}">
            <option value="submitted" ${app.status==='submitted' ? 'selected':''}>Submitted</option>
            <option value="in_review" ${app.status==='in_review' ? 'selected':''}>In Review</option>
            <option value="approved"  ${app.status==='approved'  ? 'selected':''}>Approved</option>
            <option value="rejected"  ${app.status==='rejected'  ? 'selected':''}>Rejected</option>
          </select>
          <button class="update-btn" onclick="updateStatus(${app.id})">
            <i class="fas fa-check"></i> Update
          </button>
        </td>
      </tr>
    `).join('');
  }

  function filterApps(status, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === 'all' ? allApps : allApps.filter(a => a.status === status);
    renderTable(filtered);
  }

  async function updateStatus(id) {
    const status = document.getElementById(`select-${id}`).value;
    try {
      const res = await fetch(`${API}/applications/status/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
        body: JSON.stringify({ status })
      });
      const data = await res.json();
      if (res.ok) {
        const badge = document.getElementById(`badge-${id}`);
        badge.className = `badge badge-${status}`;
        badge.textContent = status.replace('_', ' ');
        const app = allApps.find(a => a.id === id);
        if (app) app.status = status;
        updateStats(allApps);
        showToast('✅ Status updated successfully!');
      } else {
        showToast('❌ Error: ' + data.message);
      }
    } catch (err) { showToast('❌ Server error!'); }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg; toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    window.location.reload();
  }
</script>
</body>
</html>
